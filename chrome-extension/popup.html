<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>House Vote Importer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <section class="section">
        <h1>House Vote Importer</h1>
        <p class="muted">Use the import token from House Vote, then save from an Airbnb or VRBO property page. If a House Vote trip tab is already open, the trip id can auto-fill.</p>
      </section>

      <section class="section">
        <label for="app-url">House Vote URL</label>
        <input id="app-url" name="app-url" placeholder="http://localhost:3000" type="url" />
      </section>

      <section class="section">
        <label for="trip-id">Trip ID</label>
        <input id="trip-id" name="trip-id" placeholder="cuid trip id" type="text" />
        <button id="detect-trip" class="secondary-button" type="button">Use Open Trip Tab</button>
      </section>

      <section class="section">
        <label for="import-token">Import Token</label>
        <textarea
          id="import-token"
          name="import-token"
          placeholder="Paste the token from House Vote"
          rows="3"
        ></textarea>
      </section>

      <section class="section compact-row">
        <label class="checkbox-row" for="debug-mode">
          <input id="debug-mode" name="debug-mode" type="checkbox" />
          <span>Parser debug mode</span>
        </label>
      </section>

      <section class="section actions">
        <button id="save-listing" type="button">Save Current Airbnb/VRBO Listing</button>
        <a id="open-saved-trip" class="link-button hidden" href="#" target="_blank" rel="noopener noreferrer">Open Saved Trip</a>
      </section>

      <section class="section">
        <h2>Last Capture</h2>
        <pre id="capture-preview">Nothing captured yet.</pre>
      </section>

      <section class="section">
        <div id="status" class="status muted">Open an Airbnb or VRBO listing page, then click save.</div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
